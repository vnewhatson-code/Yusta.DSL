          \ и поля\n3. Сценарии использования\n4. Зависимости, настройки и особенности\n\
          \nЕсли чего-то не хватит я задам тебе уточняющие вопросы.\n\n2️⃣ Начни с\
          \ простого\n\nОпиши всё, что знаешь — в свободной форме, с логичным разделением\
          \ на абзацы. Например:\n\n\"При выборе способа авторизации По паролю отображаются\
