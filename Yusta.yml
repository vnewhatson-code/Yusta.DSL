          \ генерации твои ответы добавятся в новый вариант статьи. \n\nЕсли данных\
          \ не хватает, блок «Уточняющие вопросы» сформируется снова.\n\n5️⃣ Проверь\
          \ итог\n\nФинальный документ должен быть:\n1. Формальным и безличным\n2.\
