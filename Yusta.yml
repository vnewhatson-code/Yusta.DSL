        desc: ''
        model:
          completion_params:
            temperature: 0.7
          mode: chat
          name: pro
          provider: langgenius/openai_api_compatible/openai_api_compatible
        prompt_template:
        - id: 0009f533-e2a4-4656-ac00-b208b3cefb27
          role: system
          text: "Ты — аудитор документации Юста. Твоя задача — анализировать текст\
            \ статьи пользователя и давать дружелюбный, структурированный аудит. \n\
            \n⚠️ Важно:  \n- Используй текст статьи пользователя как основу для анализа.\
            \  \n- Не выводи JSON в чат. JSON нужен только для внутренней логики и\
            \ проверки SGR.  \n- Вывод пользователю должен быть читаемым текстом,\
            \ с подзаголовками, списками и абзацами.  \n- Давай рекомендации, вопросы\
            \ для уточнения и общую оценку.  \n\nПринципы аудита:  \n1. Проверяй полноту\
            \ следующих параметров: \n   - Цель функции  \n   - Пользовательский сценарий\
            \  \n   - Интерфейсные элементы  \n   - Логика работы системы  \n   -\
            \ Ограничения и зависимости  \n   - Ожидаемый результат  \n\n2. Для каждого\
            \ параметра:  \n   - Если он раскрыт полностью → отмечай в SGR как True.\
            \  \n   - Если отсутствует или частично раскрыт → формулируй дружелюбный\
            \ вопрос или предложение для исправления и отмечай как False.  \n\n3.\
            \ Генерируй только текст:  \n   - Списки проблем (issues)  \n   - Списки\
            \ рекомендаций (suggestions)  \n   - Списки вопросов (questions)  \n \
            \  - Общую оценку (overall_score)  \n\n4. Пример формата для пользователя\
            \ (не JSON):  \n\n---\nЯ просмотрел вашу статью и предлагаю следующие\
            \ улучшения:\n\n### ⚠️ Найденные проблемы\n- Проблема 1\n- Проблема 2\n\
            \n### \U0001F4A1 Рекомендации по улучшению\n- Как можно исправить 1\n\
            - Как можно исправить 2\n\n### ❓ Вопросы для уточнения\n- Вопрос 1\n-\
            \ Вопрос 2\n\n### \U0001F3C6 Общая оценка\nТребует доработок\n---\n\n\
            5. Внутренний JSON для SGR формируется отдельно (для проверки схемы) и\
            \ не показывается пользователю."
        - id: 81e75ae1-d585-471d-bc3a-0e09b48b3af5
          role: user
          text: '{{#sys.query#}}'
        selected: false
        structured_output:
          schema:
            $schema: http://json-schema.org/draft-07/schema#
            properties:
              context_completeness:
                description: Assessment of completeness of critical parameters from
                  the generation schema
                properties:
                  behavior_detailed:
                    description: Whether system behavior, states and logic are detailed
                    type: boolean
                  behavior_detailed_reason:
                    description: Justification based on user text
                    type: string
                  interface_described:
                    description: Whether interface elements and their roles are described
                    type: boolean
                  interface_described_reason:
                    description: Justification based on user text
                    type: string
                  limitations_defined:
                    description: Whether limitations and dependencies are described
                    type: boolean
                  limitations_defined_reason:
                    description: Justification based on user text
                    type: string
                  purpose_clear:
                    description: Whether the feature's purpose is fully and clearly
                      described
                    type: boolean
                  purpose_clear_reason:
                    description: Justification based on user text
                    type: string
                  result_clear:
                    description: Whether the expected outcome is clear
                    type: boolean
                  result_clear_reason:
                    description: Justification based on user text
                    type: string
                  scenario_clear:
                    description: Whether the main user scenario is clearly described
                    type: boolean
                  scenario_clear_reason:
                    description: Justification based on user text
                    type: string
                required:
                - purpose_clear
                - purpose_clear_reason
                - scenario_clear
                - scenario_clear_reason
                - interface_described
                - interface_described_reason
                - behavior_detailed
                - behavior_detailed_reason
                - limitations_defined
                - limitations_defined_reason
                - result_clear
                - result_clear_reason
                type: object
              issues:
                description: List of identified problems, inconsistencies or format
                  violations
                items:
                  minLength: 1
                  type: string
                type: array
              overall_score:
                description: Short summary evaluation of the article quality
                enum:
                - Отлично
                - Хорошо
                - Требует доработок
                - Недостаточно данных
                type: string
              questions:
                description: Clarifying questions for missing or incomplete context
                items:
                  minLength: 1
                  type: string
                type: array
              suggestions:
                description: Concrete improvement proposals, including example formulations
                items:
                  minLength: 1
                  type: string
                type: array
            required:
            - issues
            - suggestions
            - questions
            - context_completeness
            - overall_score
            title: Documentation Article Audit Output
            type: object
