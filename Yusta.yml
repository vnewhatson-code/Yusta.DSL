          \ логин и пароль для авторизации». \"\n\n3️⃣ Я создам черновик статьи, разобью\
          \ текст на абзацы и списки для лучшей читаемости. Если данных не хватает,\
          \ сформируется блок «Уточняющие вопросы». Отвечай на них кратко и по существу,\
